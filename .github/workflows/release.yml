name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'  # matches v0.1.0, v1.2.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe can find the previous tag

      - name: Build release notes from commits
        run: |
          # Annotated tag message first (empty for lightweight tags).
          TAG_BODY=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          {
            if [ -n "$TAG_BODY" ]; then
              printf '%s\n\n' "$TAG_BODY"
            fi
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              git log --oneline --no-merges
            else
              git log --oneline --no-merges "${PREV_TAG}..${{ github.ref_name }}"
            fi
          } > notes.txt

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --notes-file notes.txt
        env:
          GH_TOKEN: ${{ github.token }}
